name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install .NET 10
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore local tools
        run: dotnet tool restore

      - name: Restore packages
        run: dotnet restore PeluqueriaAdmin.sln

      - name: Verify format
        run: dotnet format PeluqueriaAdmin.sln --verify-no-changes --no-restore

      - name: Build Release
        run: dotnet build PeluqueriaAdmin.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test PeluqueriaAdmin.sln --configuration Release --no-build
